<html>

<head>

    <title>Video Result</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="/static/script.js"></script>

</head>

<body onload="loadVideoResult()">

   
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/select">Select</a>
        <a href="/image">Image</a>
        <a href="/video">Video</a>
    </div>

    <div class="center-box">

        <h2> Video Result</h2>

        <p id="info"></p>

        <p id="modelUsed"></p>

        <p id="reason"></p>

        <h3>Detected Frames</h3>

        <div
            id="frames"
            class="frames-box"
        ></div>

        <br>

        <button onclick="goHome()">
             Exit
        </button>

    </div>


    <script>

        function goHome() {

            let ok =
                confirm("Exit to Home Page?");

            if(ok) {

                window.location.href = "/";

            }
        }

    </script>

</body>

</html>
